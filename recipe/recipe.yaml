context:
  name: ocamlbuild
  version: 0.16.1
  library: ${{ "Library/" if not unix }}
  dot: ${{ "./" if unix }}
  m2: ${{ "m2-" if not unix }}

package:
  name: ocamlbuild
  version: ${{ version }}

source:
  url: https://github.com/ocaml/ocamlbuild/archive/${{ version }}.tar.gz
  sha256: 2ba6857f2991b7f69368e8db818b163d31cf5a367f15f5953bf8f01a77b3d4fc

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ m2 }}make
    - ${{ m2 }}sed
    - ocaml_${{ build_platform }} >=5.4.0
    - if: build_platform != target_platform
      then:
        - ocaml_${{ target_platform }} >=5.4.0
    - if: osx
      then:
        - lld
        - llvm-tools
    - if: not unix
      then:
        - ${{ m2 }}coreutils
        - ${{ m2 }}diffutils
        - ${{ m2 }}which
  run_constraints:
    - ocaml >=5.4.0

tests:
  - package_contents:
      strict: true
      bin:
        - ocamlbuild
        - ocamlbuild.native
      files:
        - ${{ library }}lib/ocaml/ocamlbuild/META
        - ${{ library }}lib/ocaml/ocamlbuild/ocamlbuild.{cmx,o,cmo}
        - ${{ library }}lib/ocaml/ocamlbuild/ocamlbuild_*.{cmi,cmx,o}
        - ${{ library }}lib/ocaml/ocamlbuild/ocamlbuildlib.{a,cma,cmxa}
        - ${{ library }}lib/ocaml/ocamlbuild/signatures.{cmi,cmti,mli}
        - ${{ library }}share/man/man1/ocamlbuild.1

  # Cross-compiled platforms: verify binary architecture
  - if: build_platform != target_platform
    then:
      script:
        - if: osx
          then:
            - otool -hv ${CONDA_PREFIX}/bin/ocamlbuild
            - otool -hv ${CONDA_PREFIX}/bin/ocamlbuild.native
        - if: linux
          then:
            - readelf -h ${CONDA_PREFIX}/bin/ocamlbuild
            - readelf -h ${CONDA_PREFIX}/bin/ocamlbuild.native

  # Native platforms: version check
  - if: build_platform == target_platform
    then:
      script:
        - ocamlbuild -version | grep ${{ version }}
        - ocamlbuild.native -version | grep ${{ version }}
      requirements:
        run:
          - ${{ m2 }}grep

  # Native platforms: full functional test
  - if: build_platform == target_platform
    then:
      script:
        - if: unix
          then:
            - echo 'let () = print_endline "Hello from ocamlbuild"' > hello.ml
          else:
            - echo let () = print_endline "Hello from ocamlbuild" > hello.ml
        - ocamlbuild hello.native && ${{ dot }}hello.native
        - ocamlbuild -clean
        - ocamlbuild hello.byte && ${{ dot }}hello.byte
      requirements:
        run:
          - ${{ c_compiler }}_impl_${{ target_platform }}
          - ocaml-compiler

  # Cross-compiled platforms: limited tests (QEMU constraints)
  - if: linux and (build_platform != target_platform)
    then:
      script:
        - ocamlbuild -documentation
        - echo 'let () = print_endline "Hello from ocamlbuild"' > hello.ml
        - ocamlbuild hello.cmo
      requirements:
        run:
          - file
          - ocaml-compiler

about:
  homepage: https://ocaml.org/
  license: LGPL-2.0-only
  license_family: LGPL
  license_file: LICENSE
  summary: OCamlbuild is a generic build tool, that has built-in rules for building OCaml library and programs.

  # The remaining entries in this section are optional, but recommended
  description: |
    OCaml is an implementation of the ML language, based on the Caml Light
    dialect extended with a complete class-based object system and a powerful
    module system in the style of Standard ML.

    OCamlbuild was distributed as part of the OCaml distribution for OCaml
    versions between 3.10.0 and 4.02.3. Starting from OCaml 4.03, it is now
    released separately (with its own version numbering).

    You should refer to the OCambuild manual for more informations on how to
    use ocamlbuild.
  documentation: https://github.com/ocaml/ocamlbuild/blob/master/manual/manual.adoc
  repository: https://github.com/ocaml/ocamlbuild

extra:
  recipe-maintainers:
    - dslarm
    - peterjc
    - MementoRC
